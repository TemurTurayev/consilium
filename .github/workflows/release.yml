name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  checks:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
  build:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p consilium --target ${{ matrix.target }}
      - name: Package
        run: tar -C target/${{ matrix.target }}/release -czf consilium-${{ matrix.target }}.tar.gz consilium
      - name: Checksum
        run: shasum -a 256 consilium-${{ matrix.target }}.tar.gz > consilium-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            consilium-${{ matrix.target }}.tar.gz
            consilium-${{ matrix.target }}.tar.gz.sha256

  desktop:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
          - os: macos-14
            target: x86_64-apple-darwin
            bundles: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install UI deps
        run: npm --prefix ui ci
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2' --locked
      - name: Build bundles
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        working-directory: desktop/src-tauri
      - name: Collect and checksum
        run: |
          mkdir -p dist
          find target/${{ matrix.target }}/release/bundle \
            \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \) \
            -exec cp {} dist/ \;
          cd dist && for f in *; do shasum -a 256 "$f" > "$f.sha256"; done && ls -la
      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/*
